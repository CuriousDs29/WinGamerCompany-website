<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="index.css" rel="stylesheet">
</head>
<body>

  <div class="login-box">
    <h2>Create Account</h2>

    <form id="registerForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    // Correct Firebase config (must match login.html exactly)
    const firebaseConfig = {
      apiKey: "AIzaSyC4h52_rz2IqmOluxdMY6D_AS0i1nO_7z4",
      authDomain: "wingamer-login-page.firebaseapp.com",
      projectId: "wingamer-login-page",
      storageBucket: "wingamer-login-page.appspot.com",
      messagingSenderId: "718524589089",
      appId: "1:718524589089:web:b504b53269a33f21f1af60",
      measurementId: "G-L2Z88EZKSQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("registerForm").addEventListener("submit", (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("Account created successfully!");
          window.location.href = "login.html";
        })
        .catch(err => {
          console.error("Firebase error:", err);
          alert("Error: " + err.message);
        });
    });
  </script>

</body>
</html>
